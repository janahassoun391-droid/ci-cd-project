services:

  web:
    build: .
    ports:
      - "8091:80"

    volumes:
      - ./app:/var/www/html

    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: recommender

    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
